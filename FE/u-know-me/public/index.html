<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta
      name="viewport"
      content="width=device-width,initial-scale=0.8,minimum-scale=0.8,maximum-scale=0.8,user-scalable=no,viewport-fit=cover"
    >
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.1/css/all.css" integrity="sha384-/frq1SRXYH/bSyou/HUp/hib7RVN1TawQYja658FEOodR/FQBKVqT9Ol+Oz3Olq5" crossorigin="anonymous">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <!-- Naver -->
    <script type="text/javascript" src="https://static.nid.naver.com/js/naverLogin_implicit-1.0.3.js" charset="utf-8"></script>
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
    <!-- // Naver -->
    <!-- Kakao -->
    <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
    <!-- //Kakao -->
    <!-- Google -->
    <meta name ="google-signin-client_id" content="126204385632-ibuafqcdp8og2o1qevlhrrcs6u7vvut1.apps.googleusercontent.com">
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <!-- <script src="https://accounts.google.com/gsi/client" async defer></script> -->
    <!-- //Google -->
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <script>
      (function () {
        let lastTouchEndAt = 0;
        const zoomShortcutKeys = new Set(["+", "=", "-", "_", "0"]);
        const zoomShortcutCodes = new Set([
          "Equal",
          "Minus",
          "Digit0",
          "NumpadAdd",
          "NumpadSubtract",
          "Numpad0",
        ]);

        const preventIfMultiTouch = function (event) {
          if (event.touches && event.touches.length > 1) {
            event.preventDefault();
          }
        };

        const preventGestureZoom = function (event) {
          event.preventDefault();
        };

        const preventBrowserZoom = function (event) {
          if (!(event.ctrlKey || event.metaKey)) {
            return;
          }

          if (event.type === "wheel") {
            event.preventDefault();
            return;
          }

          if (
            event.type === "keydown" &&
            (zoomShortcutKeys.has(event.key) || zoomShortcutCodes.has(event.code))
          ) {
            event.preventDefault();
          }
        };

        document.addEventListener("gesturestart", preventGestureZoom, {
          passive: false,
        });
        document.addEventListener("gesturechange", preventGestureZoom, {
          passive: false,
        });
        document.addEventListener("gestureend", preventGestureZoom, {
          passive: false,
        });
        document.addEventListener("touchstart", preventIfMultiTouch, {
          passive: false,
        });
        document.addEventListener(
          "touchmove",
          function (event) {
            if (event.scale && event.scale !== 1) {
              event.preventDefault();
            }
          },
          { passive: false }
        );
        document.addEventListener(
          "touchend",
          function (event) {
            const now = Date.now();
            if (now - lastTouchEndAt <= 300) {
              event.preventDefault();
            }
            lastTouchEndAt = now;
          },
          { passive: false }
        );
        document.addEventListener("wheel", preventBrowserZoom, {
          passive: false,
        });
        document.addEventListener("keydown", preventBrowserZoom);
      })();
    </script>
    <!-- built files will be auto injected -->
  </body>
</html>
